---
apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config-pvc
  namespace: jellyfin
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
      - name: jellyfin
        image: jellyfin/jellyfin:latest
        env:
        - name: TZ
          value: "Africa/Johannesburg"
        ports:
        - containerPort: 8096
          name: web-tcp
          protocol: TCP
        volumeMounts:
        - name: config-volume
          mountPath: /config
        - name: movies-volume
          mountPath: /movies
        - name: shows-volume
          mountPath: /shows
        - name: music-volume
          mountPath: /music
      volumes:
      - name: config-volume
        persistentVolumeClaim:
          claimName: jellyfin-config-pvc
      - name: movies-volume
        hostPath:
          path: /home/matt/share/movies
          type: DirectoryOrCreate
      - name: shows-volume
        hostPath:
          path: /home/matt/share/shows
          type: DirectoryOrCreate
      - name: music-volume
        hostPath:
          path: /home/matt/share/music
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-service
  namespace: jellyfin
spec:
  type: LoadBalancer
  selector:
    app: jellyfin
  ports:
  - port: 8096
    targetPort: 8096
    protocol: TCP
    name: web
